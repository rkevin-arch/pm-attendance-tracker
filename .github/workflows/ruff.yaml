name: Ruff linting
on: [push]
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
      - name: Sync dependencies
        run: uv sync --locked --all-extras --dev
      - name: Ruff check
        run: uv run ruff check
      - name: Ruff format
        run: uv run ruff format --check
